<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamoDrop | Güvenli Transfer</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QR Kod Oluşturucu CDN -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <!-- QR Kod Okuyucu (Kamera) CDN -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <span class="icon">🚀</span>
                <h1>BeamoDrop</h1>
            </div>
            <p>Uçtan uca şifreli, kayıpsız P2P dosya paylaşımı.</p>
        </header>

        <main class="card-glass">
            <!-- Ana Butonlar -->
            <div class="action-buttons">
                <button id="btn-send" class="btn primary-blue">
                    <span class="btn-text">BeamO Gönder</span>
                </button>
                <button id="btn-receive" class="btn outline-blue">
                    <span class="btn-text">QR Tara & Al</span>
                </button>
            </div>

            <!-- Gönderici Ekranı -->
            <div id="sender-section" class="hidden section">
                <div class="qr-box">
                    <p class="subtitle">Alıcı cihazdan bu QR kodu okutun</p>
                    <div class="canvas-wrapper">
                        <canvas id="qr-canvas"></canvas>
                    </div>
                </div>

                <input type="file" id="file-input" class="hidden" multiple>
                
                <!-- YENİ: Seçilen Dosyaların Vitrini -->
                <div id="staging-area" class="hidden staging-container">
                    <div class="staging-header">
                        <span>Seçilen Dosyalar</span>
                        <span id="file-count-badge" class="badge">0</span>
                    </div>
                    <div id="file-list" class="file-grid"></div>
                    <button id="btn-start-transfer" class="btn primary-blue mt-2 animate-pulse">BeamO Aktarımını Başlat</button>
                </div>

                <button id="btn-select-file" class="btn outline-blue mt-2 hidden">Dosya Ekle</button>
            </div>

            <!-- Alıcı Ekranı -->
            <div id="receiver-section" class="hidden section">
                <p class="subtitle">Kamerayı QR Koda Hizalayın</p>
                <div id="qr-reader" class="scanner-box"></div>
            </div>

            <!-- İlerleme Çubuğu -->
            <div id="progress-container" class="hidden mt-2 progress-wrapper">
                <div class="progress-info">
                    <span id="status-text">Bağlantı bekleniyor...</span>
                    <span id="progress-percentage">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
