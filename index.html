<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamoDrop | Cihazdan Cihaza Güvenli Transfer</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div class="app-container">
        <!-- YENİ: Geri Dön / İptal Butonu -->
        <button id="btn-back" class="btn outline-blue hidden" style="margin-bottom: 1rem; width: auto; padding: 0.5rem 1rem; font-size: 0.85rem;">
            ← Bağlantıyı Kes
        </button>

        <header class="app-header">
            <div class="logo">
                <svg class="mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="beamGrad" x1="4" y1="30" x2="36" y2="10" gradientUnits="userSpaceOnUse">
                            <stop offset="0" stop-color="#5eead4"/>
                            <stop offset="1" stop-color="#a78bfa"/>
                        </linearGradient>
                    </defs>
                    <path class="beam-line" d="M9 28 L31 12" stroke="url(#beamGrad)" stroke-width="2" stroke-linecap="round"/>
                    <polygon class="node node-a" points="9,20 15.3,23.6 15.3,30.9 9,34.5 2.7,30.9 2.7,23.6" fill="#0b111d" stroke="#5eead4" stroke-width="1.6"/>
                    <circle cx="9" cy="27.2" r="2.4" fill="#5eead4"/>
                    <polygon class="node node-b" points="31,5.5 37.3,9.1 37.3,16.4 31,20 24.7,16.4 24.7,9.1" fill="#0b111d" stroke="#a78bfa" stroke-width="1.6"/>
                    <circle cx="31" cy="12.7" r="2.4" fill="#a78bfa"/>
                </svg>
                <h1>Beamo<span>Drop</span></h1>
            </div>
            <p class="eyebrow"><span class="dot"></span>P2P &middot; UÇTAN UCA ŞİFRELİ &middot; SUNUCUDA İZ BIRAKMAZ</p>
        </header>

        <main class="card-glass">
            <!-- Ana Butonlar -->
            <div id="action-buttons" class="action-buttons">
                <button id="btn-send" class="btn primary-blue">Dosya Gönder</button>
                <button id="btn-receive" class="btn outline-blue">QR Tara &amp; Al</button>
            </div>

            <!-- Gönderici Ekranı -->
            <div id="sender-section" class="hidden section">
                <div id="qr-box" class="qr-box">
                    <p class="subtitle">Alıcı cihazdan bu QR kodu okutun</p>
                    <div class="canvas-wrapper">
                        <canvas id="qr-canvas"></canvas>
                    </div>
                </div>

                <input type="file" id="file-input" class="hidden" multiple>

                <!-- Seçilen Dosyalar -->
                <div id="staging-area" class="hidden staging-container mt-2">
                    <div class="staging-header">
                        <span>Gönderilecekler</span>
                        <span id="file-count-badge" class="badge">0</span>
                    </div>
                    <div id="file-list" class="file-grid"></div>
                    <button id="btn-start-transfer" class="btn primary-blue mt-2 animate-pulse">Aktarımı Başlat</button>
                </div>

                <button id="btn-select-file" class="btn outline-blue mt-2 hidden">Daha Fazla Dosya Seç</button>
            </div>

            <!-- Alıcı Ekranı -->
            <div id="receiver-section" class="hidden section">
                <div id="scanner-container">
                    <p class="subtitle">Kamerayı QR koda hizalayın</p>
                    <div id="qr-reader" class="scanner-box"></div>
                </div>

                <!-- YENİ: Alınan Dosyalar Galerisi -->
                <div id="received-gallery" class="hidden staging-container mt-2">
                    <div class="staging-header">
                        <span>Gelen Dosyalar</span>
                    </div>
                    <div id="received-list" class="file-grid" style="grid-template-columns: 1fr; gap: 1rem;"></div>
                </div>
            </div>

            <!-- Ortak İlerleme Çubuğu -->
            <div id="progress-container" class="hidden mt-2 progress-wrapper">
                <div class="progress-info">
                    <span id="status-text">Bağlantı bekleniyor...</span>
                    <span id="progress-percentage">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
