<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamoDrop | Cihazdan Cihaza Güvenli Transfer</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div class="app-container">
        <!-- Geri Dön / İptal Butonu -->
        <button id="btn-back" class="btn btn-outline hidden" style="margin-bottom: 1.5rem; width: auto; padding: 0.5rem 1rem; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 5px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Bağlantıyı Kes
        </button>

        <header class="app-header">
            <div class="logo">
                <!-- Premium Geometrik Monokrom Logo (Minimalist & Resmi Tasarım) -->
                <svg class="mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="10" y="10" width="14" height="14" fill="#ffffff" />
                    <rect x="16" y="16" width="14" height="14" fill="transparent" stroke="#ffffff" stroke-width="2" />
                    <line x1="10" y1="30" x2="30" y2="10" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 4" class="beam-line" />
                </svg>
                <h1>Beamo<span>Drop</span></h1>
            </div>
            <p class="eyebrow"><span class="dot"></span>P2P &middot; UÇTAN UCA ŞİFRELİ</p>
        </header>

        <main class="card-official">
            <!-- Ana Butonlar -->
            <div id="action-buttons" class="action-buttons">
                <button id="btn-send" class="btn btn-outline">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                    Uzak Dosya Gönder (QR)
                </button>
                <button id="btn-receive" class="btn btn-outline">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="8" y1="12" x2="16" y2="12"></line><line x1="12" y1="8" x2="12" y2="16"></line></svg>
                    Uzak Dosya Al (QR)
                </button>
                <button id="btn-beamoair" class="btn btn-primary mt-2" style="padding: 1.2rem 1rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"></path><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"></path><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
                    BeamoAir (Aynı Ağ Radarı)
                </button>
            </div>

            <!-- BeamoAir Radar Ekranı -->
            <div id="beamoair-section" class="hidden section">
                <div class="staging-header" style="justify-content: center; border-bottom: none; margin-bottom: 0;">
                    <span style="font-size: 0.9rem; color: var(--text-primary); letter-spacing: 0.05em;">📡 ÇEVREDEKİ CİHAZLAR TARANIYOR</span>
                </div>
                <p class="subtitle" style="font-size: 0.75rem; margin-top: 5px;">Aynı Wi-Fi ağına bağlı cihazlar burada listelenir.</p>
                <div id="radar-list" class="radar-container mt-2">
                    <!-- Dinamik Liste Buraya Gelecek -->
                </div>
            </div>

            <!-- Gönderici Ekranı -->
            <div id="sender-section" class="hidden section">
                <div id="qr-box" class="qr-box">
                    <p class="subtitle">Alıcı cihazdan bu QR kodu okutun</p>
                    <div class="canvas-wrapper">
                        <canvas id="qr-canvas"></canvas>
                    </div>
                </div>

                <input type="file" id="file-input" class="hidden" multiple>

                <!-- Seçilen Dosyalar -->
                <div id="staging-area" class="hidden staging-container mt-2">
                    <div class="staging-header">
                        <span>Gönderilecekler</span>
                        <span id="file-count-badge" class="badge">0</span>
                    </div>
                    <div id="file-list" class="file-grid"></div>
                    <button id="btn-start-transfer" class="btn btn-primary mt-2 animate-pulse">Aktarımı Başlat</button>
                </div>

                <button id="btn-select-file" class="btn btn-outline mt-2 hidden">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-right: 5px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Dosya Ekle
                </button>
            </div>

            <!-- Alıcı Ekranı -->
            <div id="receiver-section" class="hidden section">
                <div id="scanner-container">
                    <p class="subtitle">Kamerayı QR koda hizalayın</p>
                    <div id="qr-reader" class="scanner-box"></div>
                </div>

                <!-- Alınan Dosyalar Galerisi -->
                <div id="received-gallery" class="hidden staging-container mt-2" style="padding: 1rem;">
                    <div class="staging-header">
                        <span>Gelen Dosyalar</span>
                    </div>
                    <div id="received-list" class="received-grid"></div>
                </div>
            </div>

            <!-- Ortak İlerleme Çubuğu -->
            <div id="progress-container" class="hidden mt-2 progress-wrapper">
                <div class="progress-info">
                    <span id="status-text">Bağlantı bekleniyor...</span>
                    <span id="progress-percentage">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Onay/Red Modalı (Pop-up) -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-content" class="modal-box card-official">
            <!-- Modal içeriği JavaScript ile dinamik olarak doldurulacak -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
